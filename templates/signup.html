<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ t(request, 'meta_desc') }}">
    <title>{{ t(request, 'signup_page_title') }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header img {
            height: 60px;
            margin-bottom: 1rem;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a href="/"><img src="/static/img/logo.png" alt="VidInsight Logo"></a>
                <h2>{{ t(request, 'signup_title') }}</h2>
                <p>{{ t(request, 'signup_desc') }}</p>
            </div>

            {% if error %}
            <div class="error-msg">
                <i class="fa-solid fa-circle-exclamation"></i> {{ t(request, error) }}
            </div>
            {% endif %}

            <form action="/kayit" method="POST">
                <div class="input-group">
                    <label for="fullName">{{ t(request, 'label_fullname') }}</label>
                    <input type="text" id="fullName" name="full_name" placeholder="{{ t(request, 'signup_ph_fullname') }}" required>
                </div>

                <div class="input-group">
                    <label for="username">{{ t(request, 'label_username') }}</label>
                    <input type="text" id="username" name="username" placeholder="{{ t(request, 'signup_ph_username') }}" required>
                </div>

                <div class="input-group">
                    <label for="email">{{ t(request, 'label_email') }}</label>
                    <input type="email" id="email" name="email" placeholder="{{ t(request, 'modal_ph_email') }}" required>
                </div>
                
                <div class="input-group">
                    <label for="password">{{ t(request, 'label_password') }}</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary w-100">{{ t(request, 'signup_btn_reg') }}</button>
            </form>

            <div class="auth-footer">
                {{ t(request, 'has_account') }} <a href="/giris">{{ t(request, 'btn_login') }}</a>
            </div>
        </div>
    </div>
</body>
</html>
